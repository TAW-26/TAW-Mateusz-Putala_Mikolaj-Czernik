<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Voyager</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    />

    <style>
        .leaflet-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        (function () {
            try {
                var raw = localStorage.getItem('smart-voyager-appearance');
                var s = raw ? JSON.parse(raw) : { colorMode: 'system', accent: 'slate', density: 'comfortable' };
                var dark = s.colorMode === 'dark' || (s.colorMode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                var root = document.documentElement;
                if (dark) root.classList.add('dark');
                root.dataset.accent = s.accent || 'slate';
                root.dataset.density = s.density || 'comfortable';
            } catch (e) {}
        })();
    </script>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>

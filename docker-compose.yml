services:
  # 1. Serwis Bazy Danych
  database:
    image: mongo:latest
    container_name: voyager_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. Serwis Backendowy
  backend:
    build: ./backend
    container_name: voyager_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      # Zamiast localhost używamy nazwy serwisu "database"
      - MONGO_URI=mongodb://database:27017/smart-voyager
      - JWT_SECRET
      - GROQ_API_KEY
    depends_on:
      - database

  # 3. Serwis Frontendowy (Aplikacja Webowa)
  web:
    build: ./web
    container_name: voyager_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend

# Wolumen zapewniający, że dane z bazy nie znikną po wyłączeniu kontenera
volumes:
  mongo_data: